h1{text-align:center;font-size:20px;font-weight:500;margin-bottom:16px;letter-spacing:0.04em;}

#setup-panel{max-width:660px;margin:0 auto 20px;}
#setup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
#setup-title{font-size:14px;font-weight:500;color:#333;}
#setup-toggle{font-size:12px;color:#888;cursor:pointer;border:1px solid #ccc;border-radius:6px;padding:3px 10px;background:#fff;display:none;}
#setup-body{background:#fff;border:1px solid #ddd;border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#f0efeb;}
th{font-size:11px;font-weight:500;color:#666;padding:8px 10px;text-align:left;border-bottom:1px solid #e8e8e8;}
td{padding:7px 10px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}

.letter-select{font-family:inherit;font-size:14px;font-weight:500;border:1px solid #ccc;border-radius:6px;padding:3px 8px;background:#fff;color:#333;cursor:pointer;width:62px;}
.letter-select.ok{border-color:#185FA5;color:#185FA5;background:#E6F1FB;}
.letter-select.dup{border-color:#cc3333;background:#fff0f0;color:#cc3333;}

.photo-btn{font-size:11px;cursor:pointer;border:1px solid #ccc;border-radius:6px;padding:4px 10px;background:#fff;color:#555;display:inline-block;}
.photo-btn.loaded{border-color:#0f6e56;color:#0f6e56;background:#e1f5ee;}
.photo-btn.loaded:hover{background:#c8ede2;border-color:#085041;}
.photo-btn input{display:none;}

.stato-cell{font-size:11px;color:#999;}
.stato-ok{color:#0f6e56;}
.stato-warn{color:#996600;}
.stato-err{color:#cc3333;}

#setup-footer{padding:10px 14px;background:#f8f8f6;border-top:1px solid #eee;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;}
#setup-info{font-size:12px;color:#888;flex:1;}
#setup-warn{font-size:12px;color:#cc3333;width:100%;order:3;}
#btn-start{font-family:inherit;font-size:14px;font-weight:500;background:#185FA5;color:#fff;border:none;border-radius:8px;padding:8px 22px;cursor:pointer;}
#btn-start:hover{background:#0f4a80;}
#btn-start:disabled{background:#aaa;cursor:default;}

#game-panel{display:none;max-width:700px;margin:0 auto;}
#photo-overlay{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);}
#photo-overlay.active{display:flex;}
#photo-overlay img{max-width:92vw;max-height:82vh;border-radius:12px;object-fit:contain;}
.photo-lbl{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;font-size:18px;font-weight:500;padding:6px 22px;border-radius:8px;white-space:nowrap;}
.cdown{position:absolute;top:16px;right:20px;background:rgba(0,0,0,0.5);color:#fff;font-size:15px;padding:4px 12px;border-radius:8px;}

#main-area{position:relative;width:100%;height:500px;margin-bottom:10px;overflow:visible;}
.tessera-wrap{position:absolute;cursor:pointer;}
.tessera-scene{width:100%;height:100%;perspective:800px;}
.tessera-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.65s cubic-bezier(.4,0,.2,1);}
.tessera-inner.flipped{transform:rotateY(180deg);}
.tessera-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tessera-back{transform:rotateY(180deg);}
.tessera-wrap:hover .tessera-inner:not(.flipped) svg{opacity:0.85;}

#prog-bar{width:180px;height:3px;background:#ddd;border-radius:2px;overflow:hidden;margin:0 auto 10px;}
#prog-fill{height:100%;background:#555;width:0%;transition:width 0.3s linear;border-radius:2px;}
#ctrl-row{display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;}
#status-txt{font-size:13px;color:#666;min-width:220px;text-align:center;transition:color 0.3s;}
#status-txt.hot{color:#993C1D;font-weight:500;}
.gbtn{font-family:inherit;font-size:13px;cursor:pointer;border:1px solid #bbb;border-radius:8px;padding:6px 14px;background:#fff;color:#333;}
.gbtn:hover{background:#f0efeb;}
#btn-puzzle{display:none;}

/* Banner ripristino */
#banner-ripristino{display:none;position:fixed;inset:0;z-index:2000;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);}
#banner-box{background:#fff;border-radius:16px;padding:28px 32px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.22);text-align:center;}
#banner-box h2{font-size:17px;font-weight:600;margin-bottom:10px;color:#1a1a1a;}
#banner-box p{font-size:13px;color:#555;margin-bottom:22px;line-height:1.5;}
#banner-box .bbtn{font-family:inherit;font-size:14px;font-weight:500;border:none;border-radius:8px;padding:9px 22px;cursor:pointer;}
#banner-box .bbtn.yes{background:#185FA5;color:#fff;margin-right:10px;}
#banner-box .bbtn.yes:hover{background:#0f4a80;}
#banner-box .bbtn.no{background:#f0efeb;color:#444;}
#banner-box .bbtn.no:hover{background:#e0dfda;}
</style>
</head>
<body>

<!-- Banner ripristino configurazione -->
<div id="banner-ripristino">
  <div id="banner-box">
    <h2>🔄 Configurazione salvata</h2>
    <p>È disponibile l'ultima configurazione con lettere e foto caricate. Vuoi riprenderla?</p>
    <button class="bbtn yes" onclick="accettaRipristino()">✓ Sì, riprendi</button>
    <button class="bbtn no" onclick="rifiutaRipristino()">✗ Ricomincia</button>
  </div>
</div>

<h1>Puzzle — SOLIDARIETÀ</h1>

<div id="setup-panel">
  <div id="setup-header">
    <span id="setup-title">⚙️ Configura classi e lettere</span>
    <button id="setup-toggle" onclick="toggleSetup()">▴ Chiudi</button>
  </div>
  <div id="setup-body">
    <table>
      <thead><tr><th>Classe</th><th>Lettera</th><th>Foto</th><th>Stato</th></tr></thead>
      <tbody id="setup-tbody"></tbody>
    </table>
  </div>
  <div id="setup-footer">
    <span id="setup-info"></span>
    <button id="btn-start" disabled>▶ Avvia</button>
    <span id="setup-warn" style="display:none"></span>
  </div>
</div>

<div id="game-panel">
  <div id="photo-overlay">
    <img id="photo-img" src="" alt="">
    <div class="photo-lbl" id="photo-lbl"></div>
    <div class="cdown" id="cdown">3</div>
  </div>
  <div id="main-area"></div>
  <div id="prog-bar"><div id="prog-fill"></div></div>
  <div id="ctrl-row">
    <span id="status-txt">Le tessere arrivano...</span>
    <button class="gbtn" onclick="avvia()">↺ Riavvia</button>
    <button class="gbtn" onclick="goSetup()">✏️ Modifica</button>
    <button class="gbtn" id="btn-puzzle" onclick="faiPuzzle()">🧩 Componi</button>
  </div>
</div>

<script>
const CLASSI=["1A","1B","2A","2B","2C","3A","3B","4A","4B","5A","5B"];
const PAROLA="SOLIDARIETÀ";
const PAL=[
  {fill:"#E6F1FB",stroke:"#185FA5",txt:"#0C447C"},{fill:"#E1F5EE",stroke:"#0F6E56",txt:"#085041"},
  {fill:"#FAEEDA",stroke:"#854F0B",txt:"#633806"},{fill:"#EEEDFE",stroke:"#534AB7",txt:"#3C3489"},
  {fill:"#FAECE7",stroke:"#993C1D",txt:"#712B13"},{fill:"#FBEAF0",stroke:"#993556",txt:"#72243E"},
  {fill:"#EAF3DE",stroke:"#3B6D11",txt:"#27500A"},{fill:"#E6F1FB",stroke:"#185FA5",txt:"#0C447C"},
  {fill:"#E1F5EE",stroke:"#0F6E56",txt:"#085041"},{fill:"#FAEEDA",stroke:"#854F0B",txt:"#633806"},
  {fill:"#EEEDFE",stroke:"#534AB7",txt:"#3C3489"}
];
const TABS=[
  {l:"flat",r:"out",t:"flat",b:"in"},{l:"in",r:"out",t:"flat",b:"out"},
  {l:"in",r:"out",t:"flat",b:"in"},{l:"in",r:"out",t:"flat",b:"out"},
  {l:"in",r:"out",t:"flat",b:"in"},{l:"in",r:"flat",t:"flat",b:"out"},
  {l:"flat",r:"out",t:"in",b:"flat"},{l:"in",r:"out",t:"out",b:"flat"},
  {l:"in",r:"out",t:"in",b:"flat"},{l:"in",r:"out",t:"out",b:"flat"},
  {l:"in",r:"flat",t:"in",b:"flat"}
];

const PW=78,PH=96,TAB=10,TH=11,PAD=TH+3,ROW1=6,ROW2=5,COMPOSE=20000,SR=3,SC=4;
const cfg={};
CLASSI.forEach(cl=>cfg[cl]={lettera:"",photo:null});
let gameData=[],timers=[],rafs=[],wraps=[],inners=[],flipped=0,done=false,busy=false;

function rnd(a,b){return a+Math.random()*(b-a);}
function opp(t){return t==="out"?"in":t==="in"?"out":"flat";}
function eio(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function clearAll(){timers.forEach(clearTimeout);timers=[];rafs.forEach(cancelAnimationFrame);rafs=[];}
function setSt(txt,hot=false){const e=document.getElementById("status-txt");e.textContent=txt;e.classList.toggle("hot",hot);}

// ---- SETUP ----
function buildSetup(){
  const tb=document.getElementById("setup-tbody");
  tb.innerHTML="";
  CLASSI.forEach((cl,ci)=>{
    const tr=document.createElement("tr");
    const t0=document.createElement("td");t0.textContent=cl;t0.style.fontWeight="500";tr.appendChild(t0);
    const t1=document.createElement("td");
    const sel=document.createElement("select");sel.className="letter-select";sel.id="sel-"+cl;
    const blank=document.createElement("option");blank.value="";blank.textContent="—";sel.appendChild(blank);
    [...PAROLA].forEach(l=>{const o=document.createElement("option");o.value=l;o.textContent=l;sel.appendChild(o);});
    sel.value=cfg[cl].lettera;
    sel.onchange=()=>{cfg[cl].lettera=sel.value;refreshSetup();salvaConfigurazione();};
    t1.appendChild(sel);tr.appendChild(t1);
    const t2=document.createElement("td");
    const lbl=document.createElement("label");lbl.className="photo-btn"+(cfg[cl].photo?" loaded":"");lbl.id="plbl-"+cl;
    lbl.textContent=cfg[cl].photo?"✓ Caricata  🔄":"📷 Carica foto";
    const inp=document.createElement("input");inp.type="file";inp.accept="image/*";
    inp.onchange=function(){
      if(!this.files[0])return;
      const r=new FileReader();
      r.onload=e=>{cfg[cl].photo=e.target.result;lbl.textContent="✓ Caricata  🔄";lbl.classList.add("loaded");refreshSetup();salvaConfigurazione();};
      r.readAsDataURL(this.files[0]);
    };
    lbl.appendChild(inp);t2.appendChild(lbl);tr.appendChild(t2);
    const t3=document.createElement("td");t3.className="stato-cell";t3.id="st-"+cl;tr.appendChild(t3);
    tb.appendChild(tr);
  });
  refreshSetup();
}

function refreshSetup(){
  const allowedCount={};
  [...PAROLA].forEach(l=>allowedCount[l]=(allowedCount[l]||0)+1);
  const used={};
  CLASSI.forEach(cl=>{const v=cfg[cl].lettera;if(v)used[v]=(used[v]||0)+1;});
  let assigned=0,errors=0,photos=0;
  CLASSI.forEach(cl=>{
    const sel=document.getElementById("sel-"+cl);
    const st=document.getElementById("st-"+cl);
    const v=cfg[cl].lettera;
    if(v){assigned++;
      const maxAllowed=allowedCount[v]||0;
      if(used[v]>maxAllowed){
        sel.className="letter-select dup";errors++;
        st.textContent=`⚠ Troppo usata (max ${maxAllowed})`;st.className="stato-cell stato-err";
      } else {
        sel.className="letter-select ok";
        st.textContent=cfg[cl].photo?"✓ Pronta":"senza foto";
        st.className="stato-cell "+(cfg[cl].photo?"stato-ok":"stato-warn");
      }
    } else {sel.className="letter-select";st.textContent="";}
    if(cfg[cl].photo)photos++;
  });
  document.getElementById("setup-info").textContent=`Lettere: ${assigned}/11 · Foto: ${photos}/11 · (la I va usata 2 volte)`;
  const warn=document.getElementById("setup-warn");
  const btn=document.getElementById("btn-start");
  if(errors>0){warn.textContent="⚠ Alcune lettere sono usate più volte del dovuto.";warn.style.display="block";btn.disabled=true;return;}
  if(assigned<11){warn.style.display="none";btn.disabled=true;return;}
  const got=CLASSI.map(cl=>cfg[cl].lettera).sort().join("");
  const want=[...PAROLA].sort().join("");
  if(got!==want){warn.textContent="⚠ Le lettere non corrispondono a SOLIDARIETÀ (S,O,L,I,D,A,R,I,E,T,À).";warn.style.display="block";btn.disabled=true;}
  else{warn.style.display="none";btn.disabled=false;}
}

function toggleSetup(){
  const b=document.getElementById("setup-body"),f=document.getElementById("setup-footer"),t=document.getElementById("setup-toggle");
  const v=b.style.display!=="none";
  b.style.display=v?"none":"";f.style.display=v?"none":"";t.textContent=v?"▾ Apri":"▴ Chiudi";
}

function goSetup(){
  clearAll();done=false;flipped=0;busy=false;
  document.getElementById("game-panel").style.display="none";
  document.getElementById("setup-panel").style.display="block";
  const b=document.getElementById("setup-body"),f=document.getElementById("setup-footer"),t=document.getElementById("setup-toggle");
  b.style.display="";f.style.display="";t.style.display="inline-block";t.textContent="▴ Chiudi";
}

function startGame(){
  const letterBucket={};
  CLASSI.forEach(cl=>{const l=cfg[cl].lettera;if(!letterBucket[l])letterBucket[l]=[];letterBucket[l].push(cl);});
  const usedCl={};
  gameData=[...PAROLA].map((l,pos)=>{
    const cl=letterBucket[l].find(c=>!usedCl[c]);usedCl[cl]=true;
    return {classe:cl,lettera:l,photo:cfg[cl].photo,palIdx:CLASSI.indexOf(cl)};
  });
  document.getElementById("setup-panel").style.display="none";
  document.getElementById("game-panel").style.display="block";
  document.getElementById("setup-toggle").style.display="inline-block";
  avvia();
}

// ---- PUZZLE ENGINE ----
function makePath(tabs,flip){
  const mx=PW/2,my=PH/2;let tl=tabs.l,tr=tabs.r,tt=tabs.t,tb=tabs.b;
  if(flip){tl=opp(tabs.r);tr=opp(tabs.l);}
  let d="M 0 0";
  if(tt==="out")d+=` L ${mx-TAB} 0 Q ${mx-TAB} ${-TH} ${mx} ${-TH} Q ${mx+TAB} ${-TH} ${mx+TAB} 0 L ${PW} 0`;
  else if(tt==="in")d+=` L ${mx-TAB} 0 Q ${mx-TAB} ${TH} ${mx} ${TH} Q ${mx+TAB} ${TH} ${mx+TAB} 0 L ${PW} 0`;
  else d+=` L ${PW} 0`;
  if(tr==="out")d+=` L ${PW} ${my-TAB} Q ${PW+TH} ${my-TAB} ${PW+TH} ${my} Q ${PW+TH} ${my+TAB} ${PW} ${my+TAB} L ${PW} ${PH}`;
  else if(tr==="in")d+=` L ${PW} ${my-TAB} Q ${PW-TH} ${my-TAB} ${PW-TH} ${my} Q ${PW-TH} ${my+TAB} ${PW} ${my+TAB} L ${PW} ${PH}`;
  else d+=` L ${PW} ${PH}`;
  if(tb==="out")d+=` L ${mx+TAB} ${PH} Q ${mx+TAB} ${PH+TH} ${mx} ${PH+TH} Q ${mx-TAB} ${PH+TH} ${mx-TAB} ${PH} L 0 ${PH}`;
  else if(tb==="in")d+=` L ${mx+TAB} ${PH} Q ${mx+TAB} ${PH-TH} ${mx} ${PH-TH} Q ${mx-TAB} ${PH-TH} ${mx-TAB} ${PH} L 0 ${PH}`;
  else d+=` L 0 ${PH}`;
  if(tl==="out")d+=` L 0 ${my+TAB} Q ${-TH} ${my+TAB} ${-TH} ${my} Q ${-TH} ${my-TAB} 0 ${my-TAB} L 0 0`;
  else if(tl==="in")d+=` L 0 ${my+TAB} Q ${TH} ${my+TAB} ${TH} ${my} Q ${TH} ${my-TAB} 0 ${my-TAB} L 0 0`;
  else d+=` L 0 0`;
  return d;
}

function makeSVG(i,flip){
  const c=PAL[gameData[i].palIdx],d=gameData[i],path=makePath(TABS[i],flip),vw=PW+2*PAD,vh=PH+2*PAD;
  const ff="-apple-system,sans-serif";
  if(!flip)return `<svg viewBox="${-PAD} ${-PAD} ${vw} ${vh}" width="${vw}" height="${vh}" style="display:block;overflow:visible"><path d="${path}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/><text x="${PW/2}" y="${PH/2-8}" text-anchor="middle" dominant-baseline="middle" font-family="${ff}" font-size="16" font-weight="500" fill="${c.txt}">${d.classe}</text><text x="${PW/2}" y="${PH/2+11}" text-anchor="middle" dominant-baseline="middle" font-family="${ff}" font-size="10" fill="${c.txt}" opacity="0.6">classe</text></svg>`;
  return `<svg viewBox="${-PAD} ${-PAD} ${vw} ${vh}" width="${vw}" height="${vh}" style="display:block;overflow:visible"><path d="${path}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/><text x="${PW/2}" y="${PH/2-8}" text-anchor="middle" dominant-baseline="middle" font-family="${ff}" font-size="40" font-weight="500" fill="${c.txt}">${d.lettera}</text><text x="${PW/2}" y="${PH/2+22}" text-anchor="middle" dominant-baseline="middle" font-family="${ff}" font-size="10" fill="${c.txt}" opacity="0.55">${d.classe}</text></svg>`;
}

function scatter(n,aW,aH){
  const cW=Math.floor(aW/SC),cH=Math.floor(aH/SR),tot=SR*SC;
  const idx=Array.from({length:tot},(_,i)=>i);
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  return Array.from({length:n},(_,i)=>{
    const ci=idx[i],col=ci%SC,row=Math.floor(ci/SC),cx=col*cW,cy=row*cH;
    const mx=Math.max(0,(cW-PW)/2-6),my=Math.max(0,(cH-PH)/2-6);
    return{x:Math.max(PAD,Math.min(aW-PW-PAD,cx+(cW-PW)/2+rnd(-mx,mx))),y:Math.max(PAD,Math.min(aH-PH-PAD,cy+(cH-PH)/2+rnd(-my,my))),rot:rnd(-20,20)};
  });
}

function targets(aW){
  const sx1=Math.max(PAD,(aW-ROW1*PW)/2),sx2=Math.max(PAD,(aW-ROW2*PW)/2),ty1=310,ty2=310+PH+TH+6;
  return gameData.map((_,i)=>{const r2=i>=ROW1,col=r2?(i-ROW1):i,sx=r2?sx2:sx1;return{x:sx+col*PW-PAD,y:(r2?ty2:ty1)-PAD};});
}

function arc(wrap,toX,toY,dur,cb){
  const sx=parseFloat(wrap.style.left),sy=parseFloat(wrap.style.top),sr=parseFloat(wrap.dataset.rot||0),t0=performance.now();
  function f(now){
    const raw=Math.min((now-t0)/dur,1),e=eio(raw),a=-110*Math.sin(raw*Math.PI);
    wrap.style.left=(sx+(toX-sx)*e)+"px";wrap.style.top=(sy+(toY-sy)*e+a)+"px";wrap.style.transform=`rotate(${sr*(1-e)}deg)`;
    if(raw<1){rafs.push(requestAnimationFrame(f));}else{wrap.style.left=toX+"px";wrap.style.top=toY+"px";wrap.style.transform="rotate(0deg)";if(cb)cb();}
  }
  rafs.push(requestAnimationFrame(f));
}

function pulse(wrap,cb){
  const r=parseFloat(wrap.dataset.rot||0);
  wrap.style.transition="transform 0.14s ease";wrap.style.transform=`rotate(${r}deg) scale(1.15)`;
  timers.push(setTimeout(()=>{wrap.style.transform=`rotate(${r}deg) scale(0.95)`;
    timers.push(setTimeout(()=>{wrap.style.transform=`rotate(${r}deg) scale(1)`;wrap.style.transition="none";timers.push(setTimeout(cb,80));},120));},140));
}

function showPhoto(cl,url,cb){
  if(!url){cb();return;}if(busy)return;busy=true;
  document.getElementById("photo-img").src=url;document.getElementById("photo-lbl").textContent="Classe "+cl;
  const cd=document.getElementById("cdown");cd.textContent="3";document.getElementById("photo-overlay").classList.add("active");
  let n=3;const t=setInterval(()=>{n--;cd.textContent=n>0?n:"";if(n<=0){clearInterval(t);document.getElementById("photo-overlay").classList.remove("active");busy=false;cb();}},1000);
}

function avvia(){
  clearAll();done=false;flipped=0;busy=false;
  const area=document.getElementById("main-area");area.innerHTML="";
  document.getElementById("prog-fill").style.width="0%";setSt("Le tessere arrivano...");
  document.getElementById("btn-puzzle").style.display="none";wraps=[];inners=[];
  const aW=area.offsetWidth||640,aH=300;
  const sh=gameData.map((_,i)=>i);for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
  const pos=scatter(gameData.length,aW,aH);
  sh.forEach((di,op)=>{
    const p=pos[op],c=PAL[gameData[di].palIdx];
    const wrap=document.createElement("div");wrap.className="tessera-wrap";
    wrap.style.cssText=`width:${PW+2*PAD}px;height:${PH+2*PAD}px;left:${p.x-PAD}px;top:${p.y-PAD}px;opacity:0;transform:rotate(${p.rot}deg) translateY(-40px);transition:opacity 0.4s ease,transform 0.45s cubic-bezier(.2,1.2,.4,1);z-index:${op+1}`;
    wrap.dataset.rot=p.rot;
    const sc=document.createElement("div");sc.className="tessera-scene";
    const inn=document.createElement("div");inn.className="tessera-inner";
    const fr=document.createElement("div");fr.className="tessera-face";fr.innerHTML=makeSVG(di,false);
    const bk=document.createElement("div");bk.className="tessera-face tessera-back";bk.innerHTML=makeSVG(di,true);
    inn.appendChild(fr);inn.appendChild(bk);sc.appendChild(inn);wrap.appendChild(sc);area.appendChild(wrap);
    wraps[di]=wrap;inners[di]=inn;
    wrap.addEventListener("click",()=>{
      if(inn.classList.contains("flipped")||done||busy)return;
      const d=gameData[di];
      showPhoto(d.classe,d.photo,()=>{
        inn.classList.add("flipped");flipped++;
        document.getElementById("prog-fill").style.width=Math.round(flipped/gameData.length*100)+"%";
        setSt(`${d.classe} → "${d.lettera}" (${flipped}/${gameData.length})`);
        if(flipped===gameData.length)timers.push(setTimeout(()=>{setSt("Tutte scoperte! Componi il puzzle.");document.getElementById("btn-puzzle").style.display="inline-block";},400));
      });
    });
    timers.push(setTimeout(()=>{wrap.style.opacity="1";wrap.style.transform=`rotate(${p.rot}deg) translateY(0)`;},80+op*130));
  });
  timers.push(setTimeout(()=>setSt("Clicca le tessere per scoprirle!"),80+(gameData.length-1)*130+500));
}

function faiPuzzle(){
  if(done)return;done=true;clearAll();
  const area=document.getElementById("main-area");document.getElementById("btn-puzzle").style.display="none";
  const aW=area.offsetWidth||640,tgts=targets(aW),n=gameData.length;
  const order=gameData.map((_,i)=>i);for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  const base=COMPOSE/n;const delays=[];let acc=0;
  order.forEach((_,s)=>{delays.push(acc);if(s===n-3)acc+=base*2.2;else if(s===n-2)acc+=base*2.8;else acc+=base*rnd(0.65,1.1);});
  const tot=acc+1200;
  [[0,"Le tessere si risvegliano..."],[tot*0.18,"Qualcosa sta prendendo forma..."],[tot*0.36,"Si intravede qualcosa..."],[tot*0.52,"Chi sarà...? 🤔"],[tot*0.67,"Quasi ci siamo..."],[delays[n-2]-700,"⏳ Penultima tessera..."],[delays[n-1]-800,"🔥 L'ultima tessera decide tutto!"]].forEach(([t,m])=>timers.push(setTimeout(()=>setSt(m,t>tot*0.5),Math.max(0,t))));
  order.forEach((di,s)=>{
    const wrap=wraps[di],t=tgts[di];
    timers.push(setTimeout(()=>{wrap.style.zIndex=100+s;pulse(wrap,()=>{arc(wrap,t.x,t.y,950,()=>{wrap.style.transition="transform 0.12s ease";wrap.style.transform="scale(1.06)";timers.push(setTimeout(()=>{wrap.style.transform="scale(1)";wrap.style.transition="none";},120));});});},delays[s]));
  });
  timers.push(setTimeout(()=>{
    setSt("🎉 SOLIDARIETÀ!");document.getElementById("prog-fill").style.width="100%";
    gameData.forEach((_,i)=>timers.push(setTimeout(()=>{const w=wraps[i];w.style.transition="transform 0.18s ease";w.style.transform="scale(1.1)";timers.push(setTimeout(()=>{w.style.transform="scale(1)";w.style.transition="none";},180));},i*55)));
  },tot));
}

// ---- PERSISTENZA localStorage ----
const STORAGE_KEY = "solidarieta_cfg_v1";

function salvaConfigurazione() {
  try {
    const data = {};
    CLASSI.forEach(cl => {
      data[cl] = { lettera: cfg[cl].lettera, photo: cfg[cl].photo };
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.warn("Salvataggio non riuscito:", e); }
}

function caricaConfigurazione() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    let hasData = false;
    CLASSI.forEach(cl => {
      if (data[cl]) {
        cfg[cl].lettera = data[cl].lettera || "";
        cfg[cl].photo   = data[cl].photo   || null;
        if (cfg[cl].lettera || cfg[cl].photo) hasData = true;
      }
    });
    return hasData;
  } catch(e) { return false; }
}

function accettaRipristino() {
  document.getElementById("banner-ripristino").style.display = "none";
  buildSetup();
}

function rifiutaRipristino() {
  CLASSI.forEach(cl => { cfg[cl].lettera = ""; cfg[cl].photo = null; });
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById("banner-ripristino").style.display = "none";
  buildSetup();
}

document.getElementById("btn-start").addEventListener("click", () => {
  salvaConfigurazione();
  startGame();
});

// ---- AVVIO ----
if (caricaConfigurazione()) {
  document.getElementById("banner-ripristino").style.display = "flex";
} else {
  buildSetup();
}
</script>
</body>
</html>
